name: deploy-docs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Install Cairo
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2

      - name: Build documentation
        run: ./scripts/build_docs.sh

      - name: Preserve PR previews from gh-pages
        run: |
          git fetch origin gh-pages:gh-pages || true
          if git show gh-pages:pr-preview >/dev/null 2>&1; then
            git worktree add --detach gh-pages-ref gh-pages
            cp -r gh-pages-ref/pr-preview site/pr-preview
            git worktree remove gh-pages-ref
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          cname: py.idfkit.com
